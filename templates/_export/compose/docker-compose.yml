# ═══════════════════════════════════════════════════════════
# {{PROJECT_NAME}} — Production Stack
# Generated by AI Dev Workbench. Fully independent.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
# ═══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: {{PROJECT_NAME}}-db
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: {{PROJECT_NAME}}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: {{PROJECT_NAME}}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app

  # ── API Server ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: {{PROJECT_NAME}}-api
    ports:
      - "${API_PORT:-3100}:3100"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=${POSTGRES_PASSWORD}
      - PG_DATABASE={{PROJECT_NAME}}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://ollama:11434/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-ollama}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-mxbai-embed-large}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - REDIS_URL=redis://redis:6379
      - PORT=3100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  # ── RAG Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: {{PROJECT_NAME}}-worker
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=${POSTGRES_PASSWORD}
      - PG_DATABASE={{PROJECT_NAME}}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://ollama:11434/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-ollama}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-mxbai-embed-large}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

volumes:
  db-data:
  redis-data:

networks:
  app:
    driver: bridge
